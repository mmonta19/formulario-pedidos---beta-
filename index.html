<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Fix | Sistema Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hidden { display: none; }
        
        /* DISEÑO ORIGINAL DE BOTONES GRANDES */
        .btn-system { 
            @apply w-full py-12 px-6 rounded-[40px] bg-white border border-slate-200 shadow-sm 
            flex flex-col items-center justify-center gap-2 transition-all active:scale-[0.98];
        }
        .btn-system .title { @apply font-black text-slate-900 text-lg uppercase tracking-tight; }
        .btn-system .subtitle { @apply font-normal text-slate-500 text-sm uppercase; }

        .input-premium { @apply w-full p-5 bg-white border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-500 font-bold text-slate-700 transition-all uppercase; }
        
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-open .accordion-content { max-height: 10000px; }
        .rotate-icon { transition: transform 0.3s; }
        .accordion-open .rotate-icon { transform: rotate(45deg); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="max-w-xl mx-auto flex flex-col min-h-screen">
        <header class="p-10 pt-16 text-center">
            <h1 class="text-4xl font-black italic tracking-tighter text-slate-900">BIO-FIX<span class="text-blue-600">®</span></h1>
            <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-slate-400 mt-2">Professional Implant Systems</p>
        </header>

        <nav class="glass sticky top-4 mx-6 p-4 rounded-[30px] shadow-lg z-50 flex justify-between items-center border border-white">
            <button id="btn-volver" onclick="goBack()" class="w-12 h-12 flex items-center justify-center bg-slate-100 rounded-2xl font-black hidden">←</button>
            <div class="flex flex-col ml-3">
                <span id="nav-subtitle" class="text-xs font-black text-slate-900 uppercase">Menú Principal</span>
            </div>
            <button onclick="goToResumen()" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-[11px] uppercase tracking-wider">
                Pedido (<span id="cart-count">0</span>)
            </button>
        </nav>

        <main class="p-6 space-y-6">
            <section id="step-choice" class="space-y-4 pt-10">
                <button onclick="showSection('step-login-old')" class="btn-system">
                    <span class="title">Cliente Registrado</span>
                </button>
                <button onclick="showSection('step-login-new')" class="btn-system !bg-blue-600">
                    <span class="title !text-white">Registro Nuevo</span>
                </button>
            </section>

            <section id="step-menu" class="hidden space-y-4">
                <button onclick="openSub('sub-implantes')" class="btn-system"><span class="title">Implantes</span></button>
                <button onclick="openSub('sub-analogicos')" class="btn-system"><span class="title">Componentes Analógicos</span></button>
                <button onclick="openSub('sub-digital')" class="btn-system"><span class="title">Flujo Digital</span></button>
            </section>

            <section id="sub-implantes" class="hidden space-y-4">
                <button onclick="loadProducts('implantes', 'monopieza')" class="btn-system">
                    <span class="title">Sistema Monopieza</span><span class="subtitle">MP</span>
                </button>
                <button onclick="loadProducts('implantes', 'basales')" class="btn-system">
                    <span class="title">Sistema Basales</span><span class="subtitle">IB / IBT</span>
                </button>
                <button onclick="loadProducts('implantes', 'compresivos')" class="btn-system">
                    <span class="title">Sistema Compresivos</span><span class="subtitle">CMU</span>
                </button>
                <button onclick="loadProducts('implantes', 'hi')" class="btn-system">
                    <span class="title">Sistema Hexágono Interno</span><span class="subtitle">HI</span>
                </button>
                <button onclick="loadProducts('implantes', 'he')" class="btn-system">
                    <span class="title">Sistema Hexágono Externo</span><span class="subtitle">HE</span>
                </button>
                <button onclick="loadProducts('implantes', 'cmhi')" class="btn-system">
                    <span class="title">Sistema Cono Morse</span><span class="subtitle">CM</span>
                </button>
                <button onclick="loadProducts('implantes', 'mu')" class="btn-system">
                    <span class="title">Sistema Multiunit</span><span class="subtitle">MU</span>
                </button>
            </section>

            <section id="sub-analogicos" class="hidden space-y-4">
                <button onclick="loadProducts('analogicos', 'mp')" class="btn-system"><span class="title">Monopieza</span><span class="subtitle">MP</span></button>
                <button onclick="loadProducts('analogicos', 'cmu')" class="btn-system"><span class="title">Compresivos</span><span class="subtitle">CMU</span></button>
                <button onclick="loadProducts('analogicos', 'hi')" class="btn-system"><span class="title">Hexágono Interno</span><span class="subtitle">HI</span></button>
                <button onclick="loadProducts('analogicos', 'he')" class="btn-system"><span class="title">Hexágono Externo</span><span class="subtitle">HE</span></button>
                <button onclick="loadProducts('analogicos', 'cm')" class="btn-system"><span class="title">Cono Morse</span><span class="subtitle">CM</span></button>
                <button onclick="loadProducts('analogicos', 'mu_pro')" class="btn-system"><span class="title">Sistema Multiunit</span><span class="subtitle">MU</span></button>
            </section>

            <section id="sub-digital" class="hidden space-y-4">
                <button onclick="loadProducts('digital', 'cmu')" class="btn-system"><span class="title">Sistema CMU</span></button>
                <button onclick="loadProducts('digital', 'hi')" class="btn-system"><span class="title">Sistema HI</span></button>
                <button onclick="loadProducts('digital', 'he')" class="btn-system"><span class="title">Sistema HE</span></button>
                <button onclick="loadProducts('digital', 'cm')" class="btn-system"><span class="title">Sistema CM</span></button>
            </section>

            <section id="step-lista" class="hidden space-y-4"></section>
            
            <section id="step-login-old" class="hidden space-y-6">
                <input type="text" id="old_nom" placeholder="Nombre y Apellido" class="input-premium">
                <button onclick="validateStart('old')" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase">Ingresar</button>
            </section>

            <section id="step-login-new" class="hidden space-y-6">
                <div class="space-y-3">
                    <input type="text" id="new_nom" placeholder="Nombre y Apellido *" class="input-premium">
                    <input type="text" id="new_dni" placeholder="DNI" class="input-premium">
                </div>
                <button onclick="validateStart('new')" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black uppercase">Registrar</button>
            </section>

            <section id="step-resumen" class="hidden space-y-5"></section>
        </main>
    </div>

        let cart = {}; let stack = ['step-choice']; let clientData = {};
        function showSection(id, push = true) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(push) stack.push(id);
            document.getElementById('btn-volver').classList.toggle('hidden', stack.length <= 1);
            window.scrollTo(0,0);
        }
        function goBack() { if(stack.length > 1) { stack.pop(); showSection(stack.pop()); } }
        function validateStart(type) {
            const nom = type === 'old' ? document.getElementById('old_nom').value : document.getElementById('new_nom').value;
            if(!nom) return alert("Ingrese su nombre");
            clientData = { nombre: nom };
            showSection('step-menu');
        }
        function openSub(id) { showSection(id); }
        function loadProducts(cat, subcat) {
            showSection('step-lista');
            const container = document.getElementById('step-lista');
            container.innerHTML = "";
            const data = DB[cat][subcat];
            for (const group in data) {
                const groupDiv = document.createElement('div');
                groupDiv.className = "bg-white rounded-[35px] overflow-hidden shadow-sm mb-4 border border-slate-100";
                let html = `<button onclick="this.parentElement.classList.toggle('accordion-open')" class="w-full flex justify-between items-center p-6 bg-slate-900 text-white font-black text-[11px] uppercase tracking-widest">
                    <span>${group}</span><span class="text-xl rotate-icon">+</span></button><div class="accordion-content divide-y">`;
                data[group].forEach(item => {
                    const q = cart[item] || 0;
                    html += `<div class="flex justify-between items-center p-6"><span class="text-[11px] font-bold text-slate-600 uppercase pr-4">${item}</span>
                        <div class="flex items-center gap-3 bg-slate-50 p-1 rounded-2xl">
                            <button onclick="update('${item}',-1,this)" class="w-10 h-10 bg-white rounded-xl shadow-sm font-bold text-slate-400">-</button>
                            <span class="font-black text-sm w-4 text-center">${q}</span>
                            <button onclick="update('${item}',1,this)" class="w-10 h-10 bg-slate-900 text-white rounded-xl shadow-md font-bold">+</button>
                        </div></div>`;
                });
                groupDiv.innerHTML = html + "</div>";
                container.appendChild(groupDiv);
            }
        }
        function update(item, delta, btn) {
            cart[item] = (cart[item] || 0) + delta;
            if(cart[item] <= 0) delete cart[item];
            btn.parentElement.querySelector('span').innerText = cart[item] || 0;
            document.getElementById('cart-count').innerText = Object.values(cart).reduce((a,b)=>a+b, 0);
        }
        function goToResumen() {
            showSection('step-resumen');
            const container = document.getElementById('step-resumen');
            container.innerHTML = `<h2 class="font-black uppercase text-center text-xl mb-6">Tu Pedido</h2><div class="bg-blue-600 text-white p-6 rounded-[30px] mb-4 font-bold text-sm">Profesional: ${clientData.nombre}</div>`;
            Object.entries(cart).forEach(([n, q]) => {
                container.innerHTML += `<div class="p-6 bg-white rounded-[30px] mb-2 flex justify-between items-center border border-slate-100 shadow-sm"><span class="text-xs font-bold uppercase">${n}</span><b class="text-blue-600">x${q}</b></div>`;
            });
            container.innerHTML += `<button onclick="sendWA()" class="w-full bg-green-500 text-white py-7 rounded-[35px] mt-6 font-black uppercase shadow-lg shadow-green-200">Enviar por WhatsApp</button>`;
        }
        function sendWA() {
            let m = `*PEDIDO BIO-FIX®*\n*DR/A:* ${clientData.nombre}\n\n`;
            Object.entries(cart).forEach(([n,q])=> m+=`✅ ${q} x ${n}\n`);
            window.open(`https://wa.me/5491122334455?text=${encodeURIComponent(m)}`);
        }
    </script>
