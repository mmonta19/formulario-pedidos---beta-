<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Fix | Sistema Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hidden { display: none; }
        
        /* BOTONES GRANDES BLANCOS ORIGINALES */
        .btn-system { 
            @apply w-full py-12 px-8 rounded-[45px] bg-white border-2 border-slate-100 shadow-xl 
            flex flex-col items-center justify-center gap-2 transition-all active:scale-[0.97] hover:border-blue-500;
        }
        .btn-system .title { @apply font-black text-slate-900 text-xl uppercase tracking-tighter; }
        .btn-system .subtitle { @apply font-normal text-slate-500 text-sm uppercase tracking-widest; }

        .input-premium { @apply w-full p-6 bg-slate-50 border-2 border-transparent rounded-[25px] outline-none focus:border-blue-500 focus:bg-white font-bold text-slate-700 transition-all uppercase; }
        
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-open .accordion-content { max-height: 10000px; }
        .rotate-icon { transition: transform 0.3s; }
        .accordion-open .rotate-icon { transform: rotate(45deg); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="max-w-xl mx-auto flex flex-col min-h-screen">
        <header class="bg-slate-900 text-white p-12 pt-16 rounded-b-[60px] shadow-2xl text-center">
            <h1 class="text-4xl font-black italic tracking-tighter">BIO-FIX<span class="text-blue-500">®</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.5em] mt-4">Professional Implant Systems</p>
        </header>

        <nav class="glass sticky top-4 mx-6 mt-[-30px] p-5 rounded-[30px] shadow-2xl z-50 flex justify-between items-center border border-white/50">
            <button id="btn-volver" onclick="goBack()" class="w-12 h-12 flex items-center justify-center bg-slate-100 rounded-2xl font-black hidden">←</button>
            <div class="flex flex-col ml-2">
                <span id="nav-subtitle" class="text-sm font-black text-slate-900 uppercase italic">Catálogo Oficial</span>
            </div>
            <button onclick="goToResumen()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg">
                Pedido (<span id="cart-count">0</span>)
            </button>
        </nav>

        <main class="p-6 mt-8 space-y-6">
            <section id="step-choice" class="space-y-5">
                <button onclick="showSection('step-login-old')" class="btn-system">
                    <span class="title">Cliente Registrado</span>
                </button>
                <button onclick="showSection('step-login-new')" class="btn-system !bg-slate-900">
                    <span class="title !text-white">Registro Nuevo</span>
                </button>
            </section>

            <section id="step-login-old" class="hidden space-y-6">
                <div class="bg-white p-8 rounded-[40px] shadow-lg border border-slate-100">
                    <input type="text" id="old_nom" placeholder="Nombre y Apellido" class="input-premium mb-4">
                    <input type="text" id="old_dni" placeholder="DNI" class="input-premium">
                </div>
                <button onclick="validateStart('old')" class="w-full bg-blue-600 text-white py-7 rounded-[30px] font-black uppercase shadow-xl">Entrar al Sistema</button>
            </section>

            <section id="step-login-new" class="hidden space-y-6">
                <div class="bg-white p-8 rounded-[40px] shadow-lg border border-slate-100 space-y-4">
                    <input type="text" id="new_nom" placeholder="Nombre y Apellido *" class="input-premium">
                    <input type="text" id="new_dni" placeholder="DNI *" class="input-premium">
                    <input type="text" id="new_mat" placeholder="Matrícula" class="input-premium">
                    <input type="text" id="new_loc" placeholder="Localidad" class="input-premium">
                </div>
                <button onclick="validateStart('new')" class="w-full bg-blue-600 text-white py-7 rounded-[30px] font-black uppercase shadow-xl">Registrar y Continuar</button>
            </section>

            <section id="step-menu" class="hidden space-y-5">
                <button onclick="openSub('sub-implantes')" class="btn-system"><span class="title">Implantes</span></button>
                <button onclick="openSub('sub-analogicos')" class="btn-system"><span class="title">Componentes Analógicos</span></button>
                <button onclick="openSub('sub-digital')" class="btn-system !border-purple-200"><span class="title text-purple-700">Flujo Digital</span></button>
            </section>

            <section id="sub-implantes" class="hidden space-y-4">
                <button onclick="loadProducts('implantes', 'monopieza')" class="btn-system"><span class="title">Sistema Monopieza</span><span class="subtitle">MP</span></button>
                <button onclick="loadProducts('implantes', 'basales')" class="btn-system"><span class="title">Sistema Basales</span><span class="subtitle">IB / IBT</span></button>
                <button onclick="loadProducts('implantes', 'compresivos')" class="btn-system"><span class="title">Sistema Compresivos</span><span class="subtitle">CMU / C3</span></button>
                <button onclick="loadProducts('implantes', 'hi')" class="btn-system"><span class="title">Sistema Hexágono Interno</span><span class="subtitle">HI</span></button>
                <button onclick="loadProducts('implantes', 'he')" class="btn-system"><span class="title">Sistema Hexágono Externo</span><span class="subtitle">HE</span></button>
                <button onclick="loadProducts('implantes', 'cmhi')" class="btn-system"><span class="title">Sistema Cono Morse</span><span class="subtitle">CM</span></button>
                <button onclick="loadProducts('implantes', 'mu')" class="btn-system"><span class="title text-amber-600">Sistema Multiunit</span><span class="subtitle">MU</span></button>
            </section>

            <section id="sub-analogicos" class="hidden space-y-4">
                <button onclick="loadProducts('analogicos', 'mp')" class="btn-system"><span class="title">Monopieza</span><span class="subtitle">MP</span></button>
                <button onclick="loadProducts('analogicos', 'cmu')" class="btn-system"><span class="title">Compresivos</span><span class="subtitle">CMU</span></button>
                <button onclick="loadProducts('analogicos', 'hi')" class="btn-system"><span class="title">Hexágono Interno</span><span class="subtitle">HI</span></button>
                <button onclick="loadProducts('analogicos', 'he')" class="btn-system"><span class="title">Hexágono Externo</span><span class="subtitle">HE</span></button>
                <button onclick="loadProducts('analogicos', 'cm')" class="btn-system"><span class="title">Cono Morse</span><span class="subtitle">CM</span></button>
                <button onclick="loadProducts('analogicos', 'mu_pro')" class="btn-system"><span class="title text-amber-600">Sistema Multiunit</span><span class="subtitle">MU</span></button>
            </section>

            <section id="sub-digital" class="hidden space-y-4">
                <button onclick="loadProducts('digital', 'cmu')" class="btn-system"><span class="title">Sistema CMU</span></button>
                <button onclick="loadProducts('digital', 'hi')" class="btn-system"><span class="title">Sistema HI</span></button>
                <button onclick="loadProducts('digital', 'he')" class="btn-system"><span class="title">Sistema HE</span></button>
                <button onclick="loadProducts('digital', 'cm')" class="btn-system"><span class="title">Sistema CM</span></button>
            </section>

            <section id="step-lista" class="hidden space-y-4"></section>
            <section id="step-resumen" class="hidden space-y-5"></section>
        </main>
    </div>

            }
        };

        let cart = {}; let stack = ['step-choice']; let clientData = {};

        function showSection(id, push = true) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(push) stack.push(id);
            document.getElementById('btn-volver').classList.toggle('hidden', stack.length <= 1);
            window.scrollTo(0,0);
        }

        function goBack() { if(stack.length > 1) { stack.pop(); showSection(stack.pop()); } }

        function validateStart(type) {
            const nom = type === 'old' ? document.getElementById('old_nom').value : document.getElementById('new_nom').value;
            const dni = type === 'old' ? document.getElementById('old_dni').value : document.getElementById('new_dni').value;
            if(!nom || !dni) return alert("Por favor complete los campos obligatorios (*)");
            clientData = { nombre: nom, dni: dni };
            showSection('step-menu');
        }

        function openSub(id) { showSection(id); }

        function loadProducts(cat, subcat) {
            showSection('step-lista');
            const container = document.getElementById('step-lista');
            container.innerHTML = "";
            const data = DB[cat][subcat];
            for (const group in data) {
                const groupDiv = document.createElement('div');
                groupDiv.className = "bg-white rounded-[35px] overflow-hidden shadow-lg mb-4 border border-slate-100";
                let html = `<button onclick="this.parentElement.classList.toggle('accordion-open')" class="w-full flex justify-between items-center p-7 bg-slate-900 text-white font-black text-[12px] uppercase tracking-widest">
                    <span>${group}</span><span class="text-xl rotate-icon">+</span></button><div class="accordion-content divide-y">`;
                data[group].forEach(item => {
                    const q = cart[item] || 0;
                    html += `<div class="flex justify-between items-center p-6"><span class="text-[11px] font-bold text-slate-600 uppercase pr-4 leading-tight">${item}</span>
                        <div class="flex items-center gap-3 bg-slate-50 p-1 rounded-2xl">
                            <button onclick="update('${item}',-1,this)" class="w-10 h-10 bg-white rounded-xl shadow-sm font-bold">-</button>
                            <span class="font-black text-sm w-4 text-center">${q}</span>
                            <button onclick="update('${item}',1,this)" class="w-10 h-10 bg-slate-900 text-white rounded-xl shadow-md font-bold">+</button>
                        </div></div>`;
                });
                groupDiv.innerHTML = html + "</div>";
                container.appendChild(groupDiv);
            }
        }

        function update(item, delta, btn) {
            cart[item] = (cart[item] || 0) + delta;
            if(cart[item] <= 0) delete cart[item];
            btn.parentElement.querySelector('span').innerText = cart[item] || 0;
            document.getElementById('cart-count').innerText = Object.values(cart).reduce((a,b)=>a+b, 0);
        }

        function goToResumen() {
            showSection('step-resumen');
            const container = document.getElementById('step-resumen');
            container.innerHTML = `<h2 class="font-black uppercase text-center text-xl mb-6">Resumen del Pedido</h2>
                <div class="bg-blue-600 text-white p-7 rounded-[30px] mb-6 font-bold text-sm shadow-xl">
                    <p>PROFESIONAL: ${clientData.nombre}</p>
                    <p class="text-[10px] opacity-80 mt-1">DNI: ${clientData.dni}</p>
                </div>`;
            Object.entries(cart).forEach(([n, q]) => {
                container.innerHTML += `<div class="p-6 bg-white rounded-[25px] mb-2 flex justify-between items-center border border-slate-100 shadow-sm">
                    <span class="text-[11px] font-bold uppercase">${n}</span>
                    <b class="text-blue-600 text-lg">x${q}</b>
                </div>`;
            });
            container.innerHTML += `<button onclick="sendWA()" class="w-full bg-green-500 text-white py-8 rounded-[35px] mt-8 font-black uppercase shadow-2xl">Enviar Pedido vía WhatsApp</button>`;
        }

        function sendWA() {
            let m = `*PEDIDO BIO-FIX®*\n*DR/A:* ${clientData.nombre}\n*DNI:* ${clientData.dni}\n\n`;
            Object.entries(cart).forEach(([n,q])=> m+=`✅ ${q} x ${n}\n`);
            window.open(`https://wa.me/5491122334455?text=${encodeURIComponent(m)}`);
        }
    </script>
</body>
</html>
